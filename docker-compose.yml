services:
  api:
    build: .
    ports: 
      - "8000:8000"
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
        - action: rebuild
          path: requirements.txt
    depends_on:
      - db
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    volumes: 
      - incidents-database:/var/lib/postgresql
    environment:
      POSTGRES_DB: Ops_Sentinel_DB
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  incidents-database: